<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naz Köse - Ödev Dünyası 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Sitenin Genel Canlı Tasarımı */
        body { 
            font-family: 'Poppins', sans-serif; /* Şık ve modern yazı tipi */
            background-color: #fff0f5; /* Çok açık tatlı bir pembe arka plan */
            color: #4a4a4a; 
            margin: 0; 
            padding: 15px; 
        }
        
        header { 
            background: linear-gradient(135deg, #ff69b4, #ffb6c1); /* Canlı pembe geçişli renk */
            color: white; 
            padding: 30px 20px; 
            text-align: center; 
            border-radius: 20px;
            box-shadow: 0 6px 15px rgba(255, 105, 180, 0.3);
            margin-bottom: 20px;
        }

        header h1 {
            margin: 0;
            font-size: 1.8em;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .container { 
            max-width: 600px; 
            margin: 0 auto; 
        }

        /* Bölüm Kutuları */
        section {
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid #ffe4e1;
        }

        h2 { 
            color: #ff1493; /* Derin pembe başlıklar */
            border-bottom: 3px solid #ffb6c1; 
            padding-bottom: 8px; 
            font-size: 1.5em;
            font-weight: 600;
            margin-top: 0;
        }

        .profile-info p { 
            line-height: 1.8; 
            font-size: 1.05em; 
            margin: 10px 0;
        }

        .profile-info strong {
            color: #db7093;
        }

        /* Yükleme Alanı */
        .upload-box {
            background: #fffafa;
            border: 3px dashed #ffb6c1;
            text-align: center;
        }

        .upload-box h3 {
            color: #ff69b4;
            margin-top: 0;
        }

        .upload-btn {
            background: linear-gradient(135deg, #ff69b4, #db7093);
            color: white; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 50px; /* Tam yuvarlak buton */
            font-weight: 700;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(219, 112, 147, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .upload-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(219, 112, 147, 0.4);
        }

        /* Ödev Kartları */
        .homework-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 18px; 
        }

        .homework-card { 
            border-radius: 15px; 
            overflow: hidden; 
            background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border: 1px solid #ffe4e1;
            transition: transform 0.3s;
        }

        .homework-card:hover {
            transform: translateY(-5px);
        }

        .homework-card img { 
            width: 100%; 
            height: 150px; 
            object-fit: cover; 
            display: block; 
        }

        .homework-card p { 
            padding: 10px; 
            margin: 0; 
            background: #fff0f5; 
            font-size: 0.95em; 
            text-align: center;
            font-weight: 600;
            color: #db7093;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Naz Köse Ödev Sitesi 🌸</h1>
        </header>

        <section class="profile-info">
            <h2>Hakkımda ✨</h2>
            <p><strong>🎀 Ad Soyad:</strong> Naz Köse</p>
            <p><strong>🆔 Okul No:</strong> [2411203004]</p>
            <p>Merhaba! Bu benim ödev sitem. Buradan tüm ödev fotoğraflarımı görüntüleyebilirsiniz.</p>
        </section>

        <section class="upload-box">
            <h3>💖 Yeni Ödev Ekle</h3>
            <input type="file" id="fotoSec" accept="image/*" style="display: none;">
            <button class="upload-btn" onclick="document.getElementById('fotoSec').click()">
                <span>📸</span> Galerimden Seç
            </button>
        </section>

        <section>
            <h2>Ödevlerim 📚</h2>
            <div id="odevListesi" class="homework-grid">
                </div>
        </section>
    </div>

    <script>
        // Fotoğraf seçildiğinde çalışan bölüm
        const fotoInput = document.getElementById('fotoSec');
        const odevListesi = document.getElementById('odevListesi');

        fotoInput.addEventListener('change', function() {
            // Birden fazla dosya seçimine izin vermek için döngü kullanıyoruz
            const dosyalar = this.files;
            
            if (dosyalar) {
                // Her seçilen dosya için bir kart oluştur
                for (let i = 0; i < dosyalar.length; i++) {
                    const dosya = dosyalar[i];
                    const okuyucu = new FileReader();
                    
                    okuyucu.onload = function(e) {
                        const yeniKart = document.createElement('div');
                        yeniKart.className = 'homework-card';
                        
                        // Bugünün tarihini alalım
                        const tarih = new Date();
                        const tarihFormat = tarih.getDate() + '.' + (tarih.getMonth()+1) + '.' + tarih.getFullYear();
                        
                        yeniKart.innerHTML = `
                            <img src="${e.target.result}">
                            <p>Ödev - ${tarihFormat}</p>
                        `;
                        odevListesi.appendChild(yeniKart);
                    }
                    okuyucu.readAsDataURL(dosya);
                }
            }
        });
        
        // Galeriden Seç butonuna basınca birden fazla dosya seçebilmek için:
        fotoInput.setAttribute('multiple', ''); 
    </script>

</body>
</html>
